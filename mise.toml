[tools]
"nix:gopls" = "0.22.0"
cspell = "10.0.1"
go = "1.26.4"
golangci-lint = "2.12.2"
prettier = "3.9.4"
terraform = "1.15.7"

# indirect dependencies
node = "26.4.0" # required by npm backend (e.g. prettier)

[plugins]
nix = "https://github.com/jbadeau/mise-nix"

[tasks.verify]
depends = ["fmt", "spell", "lint", "install", "generate"]
alias = "vv"

[tasks.build]
run = "GOFLAGS= go build -v ./..."

[tasks.install]
depends = ["build"]
run = "GOFLAGS= go install -v ./..."

[tasks.lint]
run = "GOFLAGS= golangci-lint run"

[tasks.generate]
dir = "{{config_root}}/tools"
run = "GOFLAGS= go generate ./..."

[tasks.fmt]
run = '''
gofmt -s -w -e .
prettier --write .
'''

[tasks.spell]
run = "cspell ."

[tasks.test]
run = "GOFLAGS= go test -v -cover -timeout=120s -parallel=10 ./..."

[tasks.test-acceptance]
env = { TF_ACC = "1" }
run = "GOFLAGS= go test -v -cover -timeout 120m ./..."
